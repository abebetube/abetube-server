<!DOCTYPE html>
<html lang="he">
<head>
  <meta charset="UTF-8">
  <title>AbeTube חיפוש</title>
  <style>
    body { font-family: Arial; direction: rtl; text-align: center; margin-top: 50px; }
    input, button { padding: 10px; font-size: 16px; margin: 5px; }
    #results img { width: 100px; }
    .video { margin: 10px 0; }
  </style>
</head>
<body>

  <h1>ברוך הבא ל-AbeTube</h1>
  <input id="searchInput" type="text" placeholder="חפש סרטון...">
  <button onclick="search()">חפש</button>

  <div id="results"></div>

  <script>
    function search() {
      const query = document.getElementById('searchInput').value;
      const url = `https://abetube-server.onrender.com/search?q=${encodeURIComponent(query)}`;

      fetch(url)
        .then(res => {
          if (!res.ok) {
            throw new Error("שגיאה בתגובה מהשרת");
          }
          return res.json();
        })
        .then(data => {
          const resultsDiv = document.getElementById('results');
          resultsDiv.innerHTML = ''; // נקה תוצאות קודמות

          if (!data || !Array.isArray(data) || data.length === 0) {
            resultsDiv.innerHTML = '<p>לא נמצאו תוצאות</p>';
            return;
          }

          data.forEach(video => {
            const videoElement = document.createElement('div');
            videoElement.className = 'video';

            videoElement.innerHTML = `
              <h3>${video.title}</h3>
              <img src="${video.thumbnail}" alt="thumbnail">
              <p><a href="https://www.youtube.com/watch?v=${video.id}" target="_blank">צפה</a></p>
            `;

            resultsDiv.appendChild(videoElement);
          });
        })
        .catch(error => {
          console.error('שגיאה:', error);
          document.getElementById('results').innerHTML = '<p>אירעה שגיאה. נסה שוב מאוחר יותר.</p>';
        });
    }
  </script>

</body>
</html>
